[tasks."a11y-cli:build"]
description = "Build the a11y-cli AT-SPI helper for the workspace runtime (Linux musl static)"
run = """
#!/bin/bash
# Builds crates/a11y-cli into a static musl Linux ELF so it runs on any
# workspace container regardless of glibc version (Debian Bookworm, Alpine,
# etc). Building against a newer glibc would fail at runtime with
# `version 'GLIBC_2.XX' not found`.
set -euo pipefail

case "$(uname -m)" in
  x86_64) HOST_ARCH=amd64; PLATFORM=linux/amd64; MUSL_TARGET=x86_64-unknown-linux-musl ;;
  aarch64|arm64) HOST_ARCH=arm64; PLATFORM=linux/arm64; MUSL_TARGET=aarch64-unknown-linux-musl ;;
  *) echo "ERROR: unsupported architecture: $(uname -m)" >&2; exit 1 ;;
esac

if [ "$(uname -s)" = "Linux" ]; then
  rustup target add "$MUSL_TARGET" >/dev/null 2>&1 || true
  cargo build --release --target "$MUSL_TARGET" -p a11y-cli
  echo "a11y-cli built at target/$MUSL_TARGET/release/a11y-cli (host)"
  exit 0
fi

if ! command -v docker >/dev/null 2>&1; then
  echo "ERROR: building a11y-cli on non-Linux hosts requires Docker." >&2
  exit 1
fi

CARGO_HOME_HOST="${CARGO_HOME:-$HOME/.cargo}"
mkdir -p "$CARGO_HOME_HOST/registry" "$CARGO_HOME_HOST/git" target/linux

echo "Cross-building a11y-cli for $PLATFORM via rust:1.90-alpine (musl static)..."
docker run --rm \\
  --platform "$PLATFORM" \\
  -v "$(pwd):/work" \\
  -v "$CARGO_HOME_HOST/registry:/usr/local/cargo/registry" \\
  -v "$CARGO_HOME_HOST/git:/usr/local/cargo/git" \\
  -w /work \\
  -e CARGO_TARGET_DIR=/work/target/linux \\
  rust:1.90-alpine \\
  sh -eu -c 'apk add --no-cache musl-dev && cargo build --release -p a11y-cli'

echo "a11y-cli built at target/linux/release/a11y-cli ($HOST_ARCH, musl static)"
"""

[tasks."a11y-cli:check"]
description = "Type-check the a11y-cli crate"
run = "cargo check -p a11y-cli"

[tasks.install-workspace-toolkit]
description = "Install workspace toolkit"
depends = ["//:a11y-cli:build"]
run = """
#!/bin/bash
set -euo pipefail

./docker/toolkit/install.sh .toolkit

host_is_glibc_linux=0
if [ "$(uname -s)" = "Linux" ] && ldd --version 2>&1 | grep -qi 'glibc\\|GNU libc'; then
  host_is_glibc_linux=1
fi

if [ "$host_is_glibc_linux" = "1" ]; then
  exit 0
fi

if ! command -v docker >/dev/null 2>&1; then
  echo "warning: Docker is required to prewarm the Hermes glibc/manylinux cache on this host." >&2
  echo "         Hermes ACP may fail to start offline in Debian workspace containers until CI or a glibc host builds the toolkit." >&2
  exit 0
fi

hermes_agent_version="${HERMES_AGENT_VERSION:-0.17.0}"
hermes_agent_package="${HERMES_AGENT_PACKAGE:-hermes-agent[acp,mcp]==$hermes_agent_version}"

docker run --rm \
  -e HERMES_AGENT_PACKAGE="$hermes_agent_package" \
  -v "$PWD:/workspace" \
  -w /workspace \
  debian:bookworm-slim \
  sh -lc 'set -eu; apt-get update >/dev/null; DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates >/dev/null; UV_CACHE_DIR=.toolkit/uv-cache UV_TOOL_DIR=.toolkit/uv-tools UV_PYTHON_INSTALL_DIR=.toolkit/python .toolkit/uv tool run --from "$HERMES_AGENT_PACKAGE" hermes-acp --help >/dev/null'
"""

