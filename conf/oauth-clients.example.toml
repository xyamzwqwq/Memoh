[clients.notion]
display_name = "Notion"
client_id = "${NOTION_OAUTH_CLIENT_ID}"
client_secret = "${NOTION_OAUTH_CLIENT_SECRET}"
authorization_endpoint = "https://mcp.notion.com/authorize"
token_endpoint = "https://mcp.notion.com/token"
redirect_uri = ""
allowed_scopes = []

[clients.linear]
display_name = "Linear"
client_id = "${LINEAR_OAUTH_CLIENT_ID}"
client_secret = "${LINEAR_OAUTH_CLIENT_SECRET}"
authorization_endpoint = "https://linear.app/oauth/authorize"
token_endpoint = "https://api.linear.app/oauth/token"
redirect_uri = ""
allowed_scopes = []

[clients.github]
display_name = "GitHub"
client_id = "${GITHUB_OAUTH_CLIENT_ID}"
client_secret = "${GITHUB_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = ["repo", "read:org"]

[clients.gmail]
display_name = "Gmail"
client_id = "${GMAIL_OAUTH_CLIENT_ID}"
client_secret = "${GMAIL_OAUTH_CLIENT_SECRET}"
redirect_uri = ""
allowed_scopes = ["https://mail.google.com/"]
