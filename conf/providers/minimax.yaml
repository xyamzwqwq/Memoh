name: Minimax
client_type: openai-completions
icon: minimax-color
base_url: https://api.minimaxi.com/v1
config:
  chat_completions_compat: minimax

models:
  - model_id: MiniMax-M2.7
    name: MiniMax M2.7
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M2.7-highspeed
    name: MiniMax M2.7 Highspeed
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M2.5
    name: MiniMax M2.5
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M2.5-Lightning
    name: MiniMax M2.5 Lightning
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800
      thinking_mode: toggle
      reasoning_efforts: [low, medium, high]

  - model_id: MiniMax-M2.1
    name: MiniMax M2.1
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M2.1-Lightning
    name: MiniMax M2.1 Lightning
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800
      thinking_mode: toggle
      reasoning_efforts: [low, medium, high]

  - model_id: MiniMax-M2
    name: MiniMax M2
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M2-Stable
    name: MiniMax M2 Stable
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 204800

  - model_id: MiniMax-M1
    name: MiniMax M1
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 1000192

  - model_id: MiniMax-Text-01
    name: MiniMax Text 01
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 1000192
