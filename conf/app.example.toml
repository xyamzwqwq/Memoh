# Memoh configuration template
# Copy to config.toml and adjust values for your environment.
# For local development, use: cp devenv/app.dev.toml config.toml

[log]
level = "info"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

[auth]
jwt_secret = "CHANGE-ME-TO-A-RANDOM-SECRET"
jwt_expires_in = "168h"

timezone = "UTC"

# Instance identity used by bridge mTLS strict mode.
# Leave empty unless [bridge_tls].mode = "strict".
instance_id = ""

[database]
# Supported values: "postgres" or "sqlite".
# PostgreSQL is recommended for shared and production deployments; SQLite is
# useful for single-node installs, local demos, and development.
driver = "postgres"

[container]
# Required. Select the workspace runtime backend.
# - containerd: direct containerd integration with CNI and snapshot support.
# - docker: host Docker Engine API, best for host/binary deployments where
#   workspace bind-mount source paths are valid on the Docker host.
# - apple: macOS Apple Container backend via socktainer.
backend = "docker"
# registry = "memoh.cn"  # Uncomment for China mainland mirror
default_image = "debian:bookworm-slim"
# Workspace image pull policy: if_not_present, always, or never.
# Local backends apply it before creating the workspace.
image_pull_policy = "if_not_present"
# containerd snapshotter name. Ignored by the Docker backend.
snapshotter = "overlayfs"
# Host/runtime data root for sockets, CNI state, overlay sidecars, and workspace metadata.
data_root = "data"
# CNI paths used by containerd-backed runtime networking.
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[containerd]
# Used when [container].backend = "containerd". The Docker Compose deployment
# starts an embedded containerd inside the server container at this socket.
socket_path = "/run/containerd/containerd.sock"
namespace = "default"
# containerd runtime shim used for workspace containers. Use
# "io.containerd.kata.v2" only on Linux hosts where Kata and KVM are available.
runtime_type = "io.containerd.runc.v2"

[docker]
# Used when [container].backend = "docker".
# Leave empty to use Docker's standard environment discovery (DOCKER_HOST,
# DOCKER_TLS_VERIFY, DOCKER_CERT_PATH, or the platform default socket).
host = ""

[bridge_tls]
# disabled: default for local/open-source deployments.
# strict: TCP workspace bridge requires mTLS. UDS/local workspace bridges keep
# using their local trust model. Shared Kata/CNI deployments should use strict.
# Generate material with:
#   scripts/gen-bridge-mtls.sh -instance-id <uuid> -out /opt/memoh/bridge-mtls
mode = "disabled"
# Directory readable by the Memoh server process. It must contain:
# server-client.crt, server-client.key, bridge-server-ca.crt.
server_dir = ""
# Directory mounted read-only into workspace containers. It must contain only
# bridge-server.crt, bridge-server.key, server-client-ca.crt. Strict mode
# rejects unexpected files here. Do not point this at server_dir, because
# server_dir contains the Memoh server client key.
bridge_dir = ""
# Optional synthetic TLS ServerName. Empty derives
# memoh-bridge.<instance_id>.bridge.memoh.internal.
server_name = ""

[apple]
# Used when [container].backend = "apple". Leave empty to use socktainer defaults.
# socket_path = "/path/to/your/.socktainer/container.sock"
# binary_path = "/opt/homebrew/bin/socktainer"
socket_path = ""
binary_path = ""

[local]
# Enables local workspaces alongside the configured container backend. This is
# intended for trusted desktop use only: there is no sandbox, and commands run
# as the server process user on the host machine.
enabled = false
# Default parent used when a local bot does not provide an explicit workspace
# path. The final default is "$HOME/.memoh/workspaces/<bot-name>".
default_workspace_parent = "~/.memoh/workspaces"
# Metadata for local workspace records. Leave empty to store it under
# [container].data_root/local/containers.
metadata_root = ""
# When true, local workspace tools may read/write/execute using host absolute
# paths outside the bot's default workspace. Desktop can enable this for a
# trusted local user; server deployments should keep local disabled.
allow_absolute_paths = true

[postgres]
# Used only when [database].driver = "postgres".
host = "127.0.0.1"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[sqlite]
# Used only when [database].driver = "sqlite".
# Relative paths are resolved from the process working directory. For Docker,
# prefer an absolute path under /opt/memoh/data so the database lives in the
# persistent memoh_data volume.
path = "data/memoh.db"
# WAL improves concurrent read/write behavior and is the recommended default.
wal = true
# How long SQLite waits for a locked database before returning "database is locked".
busy_timeout_ms = 5000

[qdrant]
base_url = "http://127.0.0.1:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:8085"

[registry]
providers_dir = "conf/providers"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[oauth_clients]
config_path = "conf/oauth-clients.toml"

[web]
host = "127.0.0.1"
port = 8082
