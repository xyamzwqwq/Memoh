name: Sync model capabilities

# Refreshes the reasoning capabilities (thinking_mode + reasoning_efforts) in the
# first-party conf/providers templates from the LiteLLM registry. This runs at
# build time only; the server never fetches LiteLLM at runtime. The resulting PR
# diff is plain YAML, so it is reviewed like any other template change.
on:
  schedule:
    # Weekly, Mondays 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enrich provider templates from LiteLLM
        run: go run ./cmd/synccaps

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-model-capabilities
          base: main
          title: "chore: sync model reasoning capabilities from LiteLLM"
          body: |
            Automated refresh of `thinking_mode` / `reasoning_efforts` in the
            first-party `conf/providers/*.yaml` templates, derived from the
            LiteLLM registry by `cmd/synccaps`.

            Third-party reseller entries are pruned and only canonical first-party
            model ids are matched, so review the YAML diff as the source of truth.
          commit-message: "chore: sync model reasoning capabilities from LiteLLM"
          add-paths: conf/providers/*.yaml
          delete-branch: true
